<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0b0e13">
<title>60 שניות חומ"ס</title>
<style>html,body{margin:0;height:100%;background:#0b0e13;color:#8b95a3;font-family:-apple-system,sans-serif}.l{display:flex;align-items:center;justify-content:center;height:100%;font-size:14px}</style>
</head>
<body>
<div class="l">טוען…</div>
<script>
// Cache-busting redirect: always load the app with a fresh timestamp so the
// browser can never serve a stale cached version. The redirect page itself is
// tiny; even if cached, it always rebuilds a new ?v= and replaces the URL.
(function(){
  var v = Date.now();
  location.replace('app.html?v=' + v);
})();
</script>
</body>
</html>
